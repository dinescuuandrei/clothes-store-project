<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>URBANVIBE | Fashion Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="site-background"></div>

<nav class="navbar fade-in-down">
    <div class="logo" onclick="showHome()">URBAN<span>VIBE</span></div>
    <div class="nav-links">
        <a href="#" onclick="showHome()">Acasă</a>
        <a href="#" id="cart-btn-nav" class="cart-btn">Coș (0)</a>
    </div>
</nav>

<div id="home-view">
    <section class="hero">
        <div class="hero-content">
            <h1 class="slide-up">Redefinește-ți Stilul</h1>
            <p class="slide-up delay-1">Descoperă noua colecție de sezon cu design minimalist și materiale premium.</p>
            <button class="btn-primary slide-up delay-2" onclick="document.getElementById('lista-produse').scrollIntoView({behavior: 'smooth'})">Explorează Colecția</button>
        </div>
    </section>

    <main class="container">
        <h2 class="section-title fade-in">Trending Acum</h2>
        <div id="lista-produse" class="product-grid"></div>
    </main>
</div>

<div id="product-detail-view" style="display: none;">
    <div class="container">
        <button class="btn-back fade-in" onclick="showHome()">← Înapoi la colecție</button>
        <div class="product-detail-wrapper slide-up">
            <div class="product-image-large">
                <img id="detail-img" src="" alt="">
            </div>
            <div class="product-info-detail">
                <span id="detail-category" class="category-badge-large"></span>
                <h1 id="detail-name"></h1>
                <div id="detail-price" class="product-price-large"></div>
                <p id="detail-description" class="product-description"></p>

                <div class="size-selector">
                    <p class="size-title">Selectează Mărimea</p>
                    <div id="size-options" class="size-options"></div>
                </div>

                <div id="detail-stock" class="stock-info"></div>
                <button id="add-to-cart-detail" class="btn-primary btn-large pulse-hover">Adaugă în coș</button>
            </div>
        </div>
    </div>
</div>

<div id="cart-modal" class="modal">
    <div class="modal-content slide-up">
        <span class="close-btn">&times;</span>
        <h2 style="margin-bottom: 2rem; font-weight: 800;">Coșul Tău</h2>
        <div id="cart-items-container"></div>
        <div class="cart-footer">
            <div class="cart-total">Total: <span id="cart-total-price">0</span> RON</div>
            <button id="checkout-btn" class="btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 1rem;">Finalizează Comanda</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
